<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDYLLE - Trust Connections</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #1a1a1a; color: white; }
        .hero-side { flex: 1.2; background: linear-gradient(135deg, #2b2b2b, #121212); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        .form-side { flex: 0.8; background-color: #121212; display: flex; flex-direction: column; justify-content: center; padding: 60px; border-left: 1px solid #2d2d2d; }
        h1 { font-size: 3.5rem; color: #b51a3a; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; }
        .tagline { font-size: 1.2rem; color: #a0a0a0; margin-bottom: 40px; }
        .action-btn { width: 100%; max-width: 340px; padding: 14px; margin-bottom: 15px; border-radius: 25px; border: 1px solid #444; background: transparent; color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; }
        .action-btn:hover { background: rgba(255,255,255,0.05); }
        .google-btn { background-color: #1a1a1a; border-color: #333; }
        .google-btn:hover { background-color: #242424; }
        .disclaimer { font-size: 0.75rem; color: #666; margin-top: 30px; }
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #fff; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background-color: #1f1f1f; color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: #b51a3a; }
        .submit-btn { width: 100%; padding: 14px; background-color: #b51a3a; border: none; color: white; font-weight: 600; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .submit-btn:hover { background-color: #94132e; }
        .toggle-link { margin-top: 20px; font-size: 0.9rem; color: #aaa; text-align: center; cursor: pointer; }
        .toggle-link span { color: #b51a3a; text-decoration: underline; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="hero-side">
        <h1>IDYLLE</h1>
        <p class="tagline">Connections built on total trust</p>
        
        <button class="action-btn" onclick="alert('Mobile login feature coming soon!')">📞 Continue with mobile</button>
        <button class="action-btn" onclick="toggleFormView(false)">✉️ Continue with email</button>
        <button class="action-btn google-btn" onclick="handleGoogleLoginClick()">✨ Continue with Google</button>
        
        <p class="disclaimer">We will never share anything without your permission</p>
    </div>

    <div class="form-side" id="authFormContainer">
        <div id="loginSection">
            <h2>Welcome Back</h2>
            <form onsubmit="handleFormLogin(event)">
                <div class="input-group">
                    <label>Email or Username</label>
                    <input type="text" id="loginIdentifier" required placeholder="Enter username or email address">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            <p class="toggle-link" onclick="toggleFormView(true)">Don't have an account? <span>Sign Up</span></p>
        </div>

        <div id="signupSection" class="hidden">
            <h2>Create Account</h2>
            <form onsubmit="handleFormSignup(event)">
                <div class="input-group"><label>Full Name</label><input type="text" id="signName" required></div>
                <div class="input-group"><label>Username</label><input type="text" id="signUser" required></div>
                <div class="input-group"><label>Email Address</label><input type="email" id="signEmail" required></div>
                <div class="input-group"><label>Password</label><input type="password" id="signPass" required></div>
                <div class="input-group"><label>Security Question: What is your hometown?</label><input type="text" id="signSecret" required placeholder="Answer verification query"></div>
                <button type="submit" class="submit-btn">Register</button>
            </form>
            <p class="toggle-link" onclick="toggleFormView(false)">Already have an account? <span>Login</span></p>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://idylle-backend.onrender.com";
        const CLIENT_ID = "716592672743-3866rn9h0p3le4kb6klehhjm9gf9pmh8.apps.googleusercontent.com"; // Fixed trailing character typo

        // 1. Initialize Google Auth Framework once the document loads safely
        window.onload = function () {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                google.accounts.id.initialize({
                    client_id: CLIENT_ID,
                    callback: handleGoogleCredentialResponse
                });
            }
        };

        // 2. Handle simple interface switching states
        function toggleFormView(showSignup) {
            document.getElementById('loginSection').classList.toggle('hidden', showSignup);
            document.getElementById('signupSection').classList.toggle('hidden', !showSignup);
        }

        // 3. Native Form Email Login Implementation
        async function handleFormLogin(e) {
            e.preventDefault();
            const identifier = document.getElementById('loginIdentifier').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });
                const data = await res.json();
                if (!res.ok) return alert(data.error);
                
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/discover';
            } catch (err) { 
                alert("Could not reach backend identity server pipeline."); 
            }
        }

        // 4. Native Form Email Registration Implementation
        async function handleFormSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signName').value;
            const username = document.getElementById('signUser').value;
            const email = document.getElementById('signEmail').value;
            const password = document.getElementById('signPass').value;
            const secretAnswer = document.getElementById('signSecret').value;

            try {
                const res = await fetch(`${BACKEND_URL}/api/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, email, password, secretAnswer })
                });
                const data = await res.json();
                if (!res.ok) return alert(data.error);
                
                alert("Account created successfully! Please log in.");
                toggleFormView(false);
            } catch (err) { 
                alert("Registration backend sequence connection failure."); 
            }
        }

        // 5. Trigger the initialized Google Sign-In prompt securely
        function handleGoogleLoginClick() {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                google.accounts.id.prompt(); 
            } else {
                alert("Google identity script is still loading. Please wait a moment.");
            }
        }

        //
