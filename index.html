<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idylle - Real Connections</title>
    <style>
        :root {
            --bg-color: #ebdff2; /* Pastel lavender theme match */
            --primary-accent: #e91e63;
            --text-dark: #111111;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 20px;
        }

        /* Branding Styles */
        .brand-container {
            text-align: center;
            margin-bottom: 35px;
        }
        .brand-logo {
            font-size: 3.5rem;
            font-weight: 900;
            color: #d60051;
            margin: 0;
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }
        .brand-subtitle {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
            margin: 10px 0 0 0;
        }

        /* Portal Wrapper */
        .auth-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Pill Buttons Design */
        .pill-btn {
            width: 100%;
            padding: 16px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s ease;
            border: 1.5px solid var(--text-dark);
            background-color: rgba(255, 255, 255, 0.4);
            color: var(--text-dark);
        }
        .pill-btn:hover {
            background-color: rgba(255, 255, 255, 0.7);
        }
        .pill-btn.dark {
            background-color: var(--text-dark);
            color: white;
            border: none;
        }
        .pill-btn.dark:hover {
            background-color: #222222;
        }
        .pill-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Legacy Form Container (Hidden until entry selection is clicked) */
        .form-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .form-box h3 {
            margin: 0 0 5px 0;
            text-align: center;
            color: #333;
        }
        .form-box input, .form-box textarea, .form-box select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #fafafa;
        }
        .submit-action-btn {
            background-color: var(--primary-accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        .footer-notice {
            font-size: 0.8rem;
            color: #555;
            text-align: center;
            margin-top: 25px;
        }
        .toggle-link {
            color: var(--primary-accent);
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: underline;
            margin-top: 5px;
        }

        /* App Dashboard Workspace Area */
        .main-container {
            display: none; 
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }
        .feed-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
        }
        .profile-pic { width: 100%; height: 320px; object-fit: cover; background-color: #ddd; }
        .info { padding: 15px; }
        .name { font-size: 1.5rem; font-weight: bold; color: #333; margin: 0; }
        .bio { color: #666; font-size: 0.95rem; margin: 10px 0; min-height: 40px; }
        .like-btn {
            background-color: var(--primary-accent);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-section {
            width: 400px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 500px;
            overflow: hidden;
            position: sticky;
            top: 20px;
        }
        .chat-header { background: var(--primary-accent); color: white; padding: 15px; font-weight: bold; font-size: 1.1rem; text-align: center; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 75%; font-size: 0.9rem; line-height: 1.4; word-break: break-word; }
        .msg.sent { background: var(--primary-accent); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #e4e6eb; color: #050505; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { display: flex; padding: 12px; border-top: 1px solid #eee; background: white; gap: 8px; }
        .chat-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; }
        .send-btn { background: none; border: none; color: var(--primary-accent); font-weight: bold; cursor: pointer; }
        
        .nav-header { display: none; width: 100%; max-width: 1100px; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logout-btn { background: none; border: 1px solid var(--primary-accent); color: var(--primary-accent); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .security-msg { margin: 5px 0 -5px 0; font-size: 0.85rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-header" id="nav-header">
        <h1 style="color: var(--primary-accent); margin:0;">Idylle Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="auth-screen" style="width:100%; display:flex; flex-direction:column; align-items:center;">
        
        <div class="brand-container">
            <h1 class="brand-logo">Idylle</h1>
            <p class="brand-subtitle">Connections built on total trust</p>
        </div>

        <div class="auth-container" id="oauth-gateways">
            <button class="pill-btn" onclick="alert('Phone registration feature coming soon!')">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                Continue with mobile
            </button>
            
            <button class="pill-btn" onclick="revealEmailForm()">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                Continue with email
            </button>
            
            <button class="pill-btn dark" onclick="alert('Google integration feature coming soon!')">
                <svg viewBox="0 0 24 24"><path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.986 0-.74-.08-1.305-.175-1.864H12.24z"/></svg>
                Continue with Google
            </button>
            
            <p class="footer-notice">We will never share anything without your permission</p>
        </div>

        <div class="form-box" id="functional-forms">
            <h3 id="form-box-title">Login</h3>
            
            <input type="text" id="auth-identifier" placeholder="Email, Username, or Phone Number">
            <input type="password" id="auth-password" placeholder="Password">
            
            <div id="signup-fields" style="display: none; flex-direction: column; gap: 14px; width: 100%;">
                <input type="password" id="auth-confirm-password" placeholder="Confirm Password">
                <input type="email" id="auth-email" placeholder="Email Address">
                <input type="text" id="auth-name" placeholder="Full Name">
                <input type="text" id="auth-username" placeholder="Choose a Unique Username">
                <input type="text" id="auth-phone" placeholder="Phone Number (Optional)">
                <input type="text" id="auth-gender" placeholder="Gender">
                <textarea id="auth-bio" placeholder="Tell us about yourself..."></textarea>
                
                <p class="security-msg">Select a Security Question:</p>
                <select id="auth-question-select">
                    <option value="What is your hometown?">What is your hometown?</option>
                    <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                    <option value="What was the model of your first car?">What was the model of your first car?</option>
                    <option value="What was the name of your elementary school?">What was the name of your elementary school?</option>
                    <option value="In what city did your parents meet?">In what city did your parents meet?</option>
                </select>
                <input type="text" id="auth-secret" placeholder="Your Security Answer">
            </div>

            <div id="reset-fields" style="display: none; flex-direction: column; gap: 14px; width: 100%;">
                <input type="text" id="reset-secret" placeholder="Enter Your Security Answer">
                <input type="password" id="reset-new-password" placeholder="Enter New Password">
            </div>

            <button class="submit-action-btn" id="auth-submit-btn" onclick="handleAuthSubmit()">Login</button>
            <p class="toggle-link" id="auth-toggle" onclick="toggleAuthMode()">Don't have an account? Sign up</p>
            <p class="toggle-link" id="forgot-toggle" style="color: #666; font-size: 0.8rem;" onclick="switchToResetMode()">Forgot Password?</p>
            <p class="toggle-link" style="color: #999; font-size: 0.8rem;" onclick="cancelFormView()">← Go Back</p>
        </div>

    </div>

    <div class="main-container" id="dashboard-screen">
        <div class="feed-section" id="feed">
            <p>Loading your discover feed...</p>
        </div>

        <div class="chat-section">
            <div class="chat-header" id="chat-with-title">Select a Match</div>
            <div class="chat-messages" id="chat-box">
                <p style="color: #999; text-align: center; margin-top: 50px;">Start matching to unlock chat rooms!</p>
            </div>
            <div class="chat-input-area">
                <input type="text" id="message-input" class="chat-input" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://idylle-backend.onrender.com/api';
        let CURRENT_USER_ID = null; 
        let activeChatUserId = null;  
        let currentMode = "login"; 
        let chatInterval = null; 

        function revealEmailForm() {
            document.getElementById('oauth-gateways').style.display = 'none';
            document.getElementById('functional-forms').style.display = 'flex';
            currentMode = "login";
            setupFormDisplay();
        }

        function cancelFormView() {
            document.getElementById('functional-forms').style.display = 'none';
            document.getElementById('oauth-gateways').style.display = 'flex';
        }

        function toggleAuthMode() {
            currentMode = (currentMode === "login") ? "signup" : "login";
            setupFormDisplay();
        }

        function setupFormDisplay() {
            const title = document.getElementById('form-box-title');
            const submitBtn = document.getElementById('auth-submit-btn');
            const toggleText = document.getElementById('auth-toggle');
            const signupFields = document.getElementById('signup-fields');
            const resetFields = document.getElementById('reset-fields');
            const identifierInput = document.getElementById('auth-identifier');
            const passwordInput = document.getElementById('auth-password');
            const forgotLink = document.getElementById('forgot-toggle');

            if (currentMode === "login") {
                title.innerText = "Login to Idylle";
                submitBtn.innerText = "Login";
                toggleText.innerText = "Don't have an account? Sign up";
                signupFields.style.display = "none";
                resetFields.style.display = "none";
                identifierInput.style.display = "block";
                passwordInput.style.display = "block";
                forgotLink.style.display = "block";
            } else if (currentMode === "signup") {
                title.innerText = "Create an Account";
                submitBtn.innerText = "Sign Up";
                toggleText.innerText = "Already have an account? Log in";
                signupFields.style.display = "flex";
                resetFields.style.display = "none";
                identifierInput.style.display = "none";
                passwordInput.style.display = "block";
                forgotLink.style.display = "none";
            }
        }

        function switchToResetMode() {
            currentMode = "reset";
            document.getElementById('form-box-title').innerText = "Reset Password";
            document.getElementById('auth-submit-btn').innerText = "Change Password";
            document.getElementById('auth-toggle').innerText = "Back to Login";
            
            document.getElementById('signup-fields').style.display = "none";
            document.getElementById('reset-fields').style.display = "flex";
            
            document.getElementById('auth-identifier').style.display = "block";
            document.getElementById('auth-identifier').placeholder = "Email, Username, or Phone Number";
            document.getElementById('auth-password').style.display = "none"; 
            document.getElementById('forgot-toggle').style.display = "none";
        }

        async function handleAuthSubmit() {
            if (currentMode === "reset") {
                const identifier = document.getElementById('auth-identifier').value.trim();
                const secretAnswer = document.getElementById('reset-secret').value.trim();
                const newPassword = document.getElementById('reset-new-password').value.trim();

                if (!identifier || !secretAnswer || !newPassword) {
                    alert("Please fill in all recovery fields.");
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identifier, secretAnswer, newPassword })
                    });
                    const data = await response.json();
                    alert(data.message || data.error);
                    if (response.ok) { currentMode = "login"; setupFormDisplay(); }
                } catch (error) { alert("Server communication error."); }
                return;
            }

            const password = document.getElementById('auth-password').value.trim();
            if (!password) { alert("Password is required."); return; }

            let endpoint = '';
            let bodyData = {};

            if (currentMode === "login") {
                endpoint = '/login';
                const identifier = document.getElementById('auth-identifier').value.trim();
                if (!identifier) { alert("Please enter your login details."); return; }
                bodyData = { identifier, password };
            } else {
                const confirmPassword = document.getElementById('auth-confirm-password').value.trim();
                if (password !== confirmPassword) { alert("Passwords do not match."); return; }

                endpoint = '/signup';
                bodyData = {
                    email: document.getElementById('auth-email').value.trim(),
                    password: password,
                    name: document.getElementById('auth-name').value.trim(),
                    username: document.getElementById('auth-username').value.trim(),
                    phone_number: document.getElementById('auth-phone').value.trim(),
                    gender: document.getElementById('auth-gender').value.trim(),
                    bio: document.getElementById('auth-bio').value.trim(),
                    secretAnswer: document.getElementById('auth-secret').value.trim()
                };
                if(!bodyData.email || !bodyData.name || !bodyData.username || !bodyData.secretAnswer) { 
                    alert("Required fields are missing."); 
                    return; 
                }
            }

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await response.json();

                if (!response.ok) { alert(data.error || "Authentication failed."); return; }

                CURRENT_USER_ID = data.user.id;
                alert(`Welcome, ${data.user.name}!`);
                
                document.getElementById('auth-screen').style.display = "none";
                document.getElementById('nav-header').style.display = "flex";
                document.getElementById('dashboard-screen').style.display = "flex";
                
                loadDiscoverFeed();
            } catch (error) { alert("Error connecting to server."); }
        }

        async function loadDiscoverFeed() {
            try {
                const response = await fetch(`${API_URL}/users/discover?userId=${CURRENT_USER_ID}`);
                const profiles = await response.json();
                const feedContainer = document.getElementById('feed');
                feedContainer.innerHTML = '';

                if(profiles.length === 0) {
                    feedContainer.innerHTML = '<p>No new profiles found!</p>';
                    return;
                }

                profiles.forEach(user => {
                    const pic = user.profile_pic_url || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=320&auto=format&fit=crop&q=80';
                    const card = document.createElement('div');
                    card.className = 'profile-card';
                    card.innerHTML = `
                        <img class="profile-pic" src="${pic}" alt="${user.name}">
                        <div class="info">
                            <p class="name">${user.name}</p>
                            <p class="bio">${user.bio || 'No bio written yet.'}</p>
                            <button class="like-btn" onclick="likeUser(${user.id}, '${user.name}')">❤️ Like</button>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        async function likeUser(likedId, name) {
            try {
                const response = await fetch(`${API_URL}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ likerId: CURRENT_USER_ID, likedId: likedId })
                });
                const data = await response.json();
                if (data.match) {
                    alert(`🎉 IT'S A MUTUAL MATCH WITH ${name.toUpperCase()}!`);
                    startChatRoom(likedId, name);
                } else {
                    alert("❤️ Like sent successfully!");
                }
                loadDiscoverFeed(); 
            } catch (error) { console.error(error); }
        }

        function startChatRoom(userId, userName) {
            activeChatUserId = userId;
            document.getElementById('chat-with-title').innerText = `Chat with ${userName}`;
            if(chatInterval) clearInterval(chatInterval);
            loadChatMessages();
            chatInterval = setInterval(loadChatMessages, 3000);
        }

        async function loadChatMessages() {
            if (!activeChatUserId) return;
            try {
                const response = await fetch(`${API_URL}/messages?userOne=${CURRENT_USER_ID}&userTwo=${activeChatUserId}`);
                const messages = await response.json();
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = '';
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = msg.sender_id === CURRENT_USER_ID ? 'msg sent' : 'msg received';
                    div.innerText = msg.message_text;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) { console.error(error); }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !activeChatUserId) return;

            try {
                const response = await fetch(`${API_URL}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senderId: CURRENT_USER_ID, receiverId: activeChatUserId, messageText: text })
                });
                if (response.ok) { input.value = ''; loadChatMessages(); }
            } catch (error) { console.error(error); }
        }

        function logout() {
            if(chatInterval) clearInterval(chatInterval);
            CURRENT_USER_ID = null;
            activeChatUserId = null;
            document.getElementById('auth-screen').style.display = "flex";
            document.getElementById('oauth-gateways').style.display = "flex";
            document.getElementById('functional-forms').style.display = "none";
            document.getElementById('nav-header').style.display = "none";
            document.getElementById('dashboard-screen').style.display = "none";
        }
    </script>
</body>
</html>
