<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDYLLE - Entrance Gateway</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-container { background: #171717; padding: 40px; border-radius: 12px; border: 1px solid #2a2a2a; width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #b51a3a; margin-bottom: 24px; font-weight: 800; letter-spacing: 1px; }
        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.8rem; color: #aaa; }
        input { background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 6px; font-size: 0.95rem; }
        button { background: #b51a3a; color: white; border: none; padding: 14px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { background: #94132e; }
        .toggle-txt { text-align: center; font-size: 0.85rem; color: #888; margin-top: 20px; cursor: pointer; }
        .toggle-txt span { color: #b51a3a; text-decoration: underline; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>IDYLLE</h2>
        
        <div id="loginFormBox">
            <div class="input-group">
                <label>Email or Username</label>
                <input type="text" id="loginId">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPass">
            </div>
            <button onclick="performLogin()">Sign In</button>
            <p class="toggle-txt" onclick="toggleViews(false)">New to the platform? <span>Register here</span></p>
        </div>

        <div id="signupFormBox" class="hidden">
            <div class="input-group">
                <label>Full Display Name</label>
                <input type="text" id="regName">
            </div>
            <div class="input-group">
                <label>Unique Username</label>
                <input type="text" id="regUser">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail">
            </div>
            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="regPass">
            </div>
            <button onclick="performSignup()">Create Account</button>
            <p class="toggle-txt" onclick="toggleViews(true)">Already registered? <span>Sign in instead</span></p>
        </div>
    </div>

    <script>
        const API = "https://idylle-backend.onrender.com";

        function toggleViews(showLogin) {
            document.getElementById('loginFormBox').classList.toggle('hidden', !showLogin);
            document.getElementById('signupFormBox').classList.toggle('hidden', showLogin);
        }

        async function performLogin() {
            const identifier = document.getElementById('loginId').value;
            const password = document.getElementById('loginPass').value;
            
            try {
                const res = await fetch(`${API}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });
                const data = await res.json();
                if(!res.ok) return alert(data.error);
                
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'discover.html';
            } catch(e) { alert("Server connectivity issue."); }
        }

        async function performSignup() {
            const name = document.getElementById('regName').value;
            const username = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;

            try {
                const res = await fetch(`${API}/api/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, email, password })
                });
                const data = await res.json();
                if(!res.ok) return alert(data.error);
                
                alert("Account created! Check server terminal logs for validation activation links.");
                toggleViews(true);
            } catch(e) { alert("Registration network failure."); }
        }
    </script>
</body>
</html>
