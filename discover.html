<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDYLLE - Discover & Profile Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navigation Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: #171717; border-bottom: 1px solid #222; z-index: 10; }
        .logo { font-size: 1.8rem; color: #b51a3a; font-weight: 800; letter-spacing: 2px; }
        .nav-actions { display: flex; align-items: center; gap: 15px; }
        
        .nav-btn { background: #222; border: 1px solid #333; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .nav-btn:hover { background: #2a2a2a; border-color: #444; }
        .logout-btn { background: none; border: 1px solid #b51a3a; color: #b51a3a; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .logout-btn:hover { background-color: #b51a3a; color: white; }

        /* Main Feed View Layout */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .card-container { width: 100%; max-width: 420px; min-height: 580px; background-color: #171717; border-radius: 16px; border: 1px solid #2a2a2a; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .profile-img-container { flex: 1; min-height: 250px; background: linear-gradient(to bottom, #2a2a2a, #1f1f1f); display: flex; justify-content: center; align-items: center; position: relative; }
        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .profile-img-container::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, #171717, rgba(23,23,23,0)); }
        .placeholder-icon { font-size: 5rem; opacity: 0.15; z-index: 0; }
        
        .profile-details { padding: 24px; background-color: #171717; z-index: 1; }
        .profile-header-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
        .profile-name { font-size: 1.6rem; font-weight: 700; }
        .profile-meta { font-size: 0.9rem; color: #b51a3a; font-weight: 600; margin-bottom: 10px; }
        .profile-bio { font-size: 0.95rem; color: #ccc; line-height: 1.5; margin-bottom: 12px; }
        
        /* Badges & Tags */
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .badge { background: #262626; border: 1px solid #363636; color: #aaa; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        .badge.goal { border-color: #b51a3a; color: #ff6b8b; }

        .action-bar { display: flex; justify-content: space-around; padding: 15px 24px 25px; background-color: #171717; }
        .swipe-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; transition: transform 0.1s; }
        .swipe-btn:active { transform: scale(0.9); }
        .btn-dislike { background-color: #222; color: #ff4444; border: 1px solid #333; }
        .btn-like { background-color: #b51a3a; color: white; }

        /* MODAL INTERFACE STYLING */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 1; transition: opacity 0.2s; }
        .modal-card { width: 90%; max-width: 500px; max-height: 85vh; background: #171717; border: 1px solid #2a2a2a; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #222; display: flex; justify-content: flex-end; gap: 10px; }

        /* Form Components inside Modal */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-group label { font-size: 0.8rem; color: #aaa; font-weight: 600; }
        .field-group input, .field-group select, .field-group textarea { background: #1f1f1f; border: 1px solid #2a2a2a; color: white; padding: 10px; border-radius: 6px; font-size: 0.9rem; }
        .field-group textarea { resize: none; height: 60px; }
        
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .checkbox-row input { width: auto; }

        /* Interactive Photo Cropper Container */
        .upload-trigger-btn { background: #1f1f1f; border: 1px dashed #444; color: #aaa; padding: 12px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; text-align: center; font-weight: 600; width: 100%; margin-top: 4px; }
        .upload-trigger-btn:hover { background: #262626; border-color: #b51a3a; color: white; }
        .file-status-label { font-size: 0.8rem; color: #888; display: block; margin-top: 4px; }
        
        .cropper-stage-wrapper { margin-top: 10px; width: 100%; max-height: 240px; overflow: hidden; background-color: #000; border-radius: 6px; border: 1px solid #333; }
        .cropper-stage-wrapper img { max-width: 100%; display: block; }

        .status-msg { text-align: center; color: #666; font-size: 1.1rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo">IDYLLE</div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="openProfileModal()">⚙️ Edit Profile</button>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </div>
    </header>

    <main>
        <div class="card-container" id="profileCard">
            <div class="profile-img-container">
                <img id="profileCardImg" src="" alt="" class="hidden">
                <div class="placeholder-icon" id="profileCardIcon">👤</div>
            </div>
            <div class="profile-details">
                <div class="profile-header-info">
                    <span class="profile-name" id="profileCardName">Loading...</span>
                </div>
                <div class="profile-meta" id="profileCardMeta">Location Info</div>
                <p class="profile-bio" id="profileCardBio">Biography descriptions loaded here...</p>
                
                <div class="tag-container" id="profileCardTags">
                    </div>
            </div>
            <div class="action-bar">
                <button class="swipe-btn btn-dislike" onclick="handleSwipe(false)">✖</button>
                <button class="swipe-btn btn-like" onclick="handleSwipe(true)">❤</button>
            </div>
        </div>

        <div id="emptyState" class="status-msg hidden">
            ✨ You've discovered everyone in your area for now! Check back shortly.
        </div>
    </main>

    <div class="modal-overlay hidden" id="profileModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>My Profile Customization</h3>
                <button class="nav-btn" style="padding: 4px 8px;" onclick="closeProfileModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="field-group">
                        <label>Display Name</label>
                        <input type="text" id="myDetailsName">
                    </div>
                    <div class="field-group">
                        <label>Approximate Area/Location</label>
                        <input type="text" id="myDetailsLocation" placeholder="e.g. New York, NY">
                    </div>
                </div>

                <div class="form-row">
                    <div class="field-group">
                        <label>Gender</label>
                        <select id="myDetailsGender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Non-Binary">Non-Binary</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Relationship Goal</label>
                        <select id="myDetailsGoal">
                            <option value="Long-term partnership">Long-term partnership</option>
                            <option value="Short-term fun">Short-term fun</option>
                            <option value="New friends">New friends</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label>Profile Image Upload & Crop</label>
                    <input type="file" id="imageLoaderInput" class="hidden" accept="image/jpeg, image/png, image/webp" onchange="initializeImageCropper(this)">
                    <button type="button" class="upload-trigger-btn" onclick="document.getElementById('imageLoaderInput').click()">📸 Pick File & Crop</button>
                    <span class="file-status-label" id="fileUploadStatus">No file chosen (Limits: JPEG/PNG/WebP, max 5MB)</span>
                    
                    <div class="cropper-stage-wrapper hidden" id="cropperStageBox">
                        <img id="imageContainerView" src="" alt="Cropping Source Target">
                    </div>
                </div>

                <div class="field-group">
                    <label>Short Biography</label>
                    <textarea id="myDetailsBio" placeholder="Say a little about yourself..."></textarea>
                </div>

                <div class="form-row">
                    <div class="field-group">
                        <label>Primary Lifestyle/Interest Tag</label>
                        <input type="text" id="myDetailsInterest" placeholder="e.g. Hiking, Cooking, Tech">
                    </div>
                    <div class="field-group">
                        <label>Looking-For Preference</label>
                        <select id="myDetailsPreference">
                            <option value="Everyone">Everyone</option>
                            <option value="Men">Men</option>
                            <option value="Women">Women</option>
                        </select>
                    </div>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="myDetailsVisibility" checked>
                    <label for="myDetailsVisibility" style="font-size: 0.85rem; color: #aaa;">Show my profile in discovery matching searches</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="nav-btn" onclick="closeProfileModal()">Cancel</button>
                <button class="submit-btn" style="width: auto; margin-top:0; padding: 8px 20px;" onclick="saveProfileChanges()">Save Profile</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const BACKEND_URL = "https://idylle-backend.onrender.com";
        let currentUser = null;
        let profilesQueue = [];
        let currentProfileIndex = 0;
        let cropperInstance = null;
        let croppedImageBase64 = "";

        window.onload = function() {
            const sessionData = localStorage.getItem('user');
            if (!sessionData) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(sessionData);
            
            populateProfileFormValues();
            fetchDiscoverFeed();
        };

        function populateProfileFormValues() {
            document.getElementById('myDetailsName').value = currentUser.name || '';
            document.getElementById('myDetailsLocation').value = currentUser.location || '';
            document.getElementById('myDetailsGender').value = currentUser.gender || 'Male';
            document.getElementById('myDetailsGoal').value = currentUser.relationship_goal || 'Long-term partnership';
            document.getElementById('myDetailsBio').value = currentUser.bio || '';
            document.getElementById('myDetailsInterest').value = currentUser.interests || '';
            document.getElementById('myDetailsPreference').value = currentUser.looking_for || 'Everyone';
            document.getElementById('myDetailsVisibility').checked = currentUser.is_visible !== false;
            
            if (currentUser.profile_pic_url) {
                croppedImageBase64 = currentUser.profile_pic_url;
                document.getElementById('fileUploadStatus').innerText = "Using current cropped profile image";
            }
        }

        function initializeImageCropper(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;

            const ALLOWED_FORMATS = ['image/jpeg', 'image/png', 'image/webp'];
            const MAX_SIZE_BYTES = 5 * 1024 * 1024;

            if (!ALLOWED_FORMATS.includes(file.type)) {
                alert("Unsupported image type. Please choose a JPEG, PNG, or WebP graphic.");
                fileInput.value = '';
                return;
            }

            if (file.size > MAX_SIZE_BYTES) {
                alert("The selected image is too large. Max allowed size limit is 5MB.");
                fileInput.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const targetImg = document.getElementById('imageContainerView');
                targetImg.src = e.target.result;
                
                document.getElementById('cropperStageBox').classList.remove('hidden');
                document.getElementById('fileUploadStatus').innerText = `Editing: ${file.name}`;

                if (cropperInstance) cropperInstance.destroy();

                cropperInstance = new Cropper(targetImg, {
                    aspectRatio: 1,
                    viewMode: 1,
                    background: false,
                    autoCropArea: 1
                });
            };
            reader.readAsDataURL(file);
        }

        async function fetchDiscoverFeed() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/users/discover?userId=${currentUser.id}`);
                if (!res.ok) throw new Error("Could not parse dashboard data arrays.");
                
                profilesQueue = await res.json();
                currentProfileIndex = 0;
                renderCurrentProfile();
            } catch (err) {
                console.error(err);
                document.getElementById('profileCardName').innerText = "Network Delay";
            }
        }

        function renderCurrentProfile() {
            if (!profilesQueue || profilesQueue.length === 0 || currentProfileIndex >= profilesQueue.length) {
                document.getElementById('profileCard').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            document.getElementById('profileCard').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            const active = profilesQueue[currentProfileIndex];
            document.getElementById('profileCardName').innerText = active.name || `@${active.username}`;
            document.getElementById('profileCardMeta').innerText = `${active.gender || 'User'} • ${active.location || 'Nearby'}`;
            document.getElementById('profileCardBio').innerText = active.bio || "No biography provided yet.";

            const cardImg = document.getElementById('profileCardImg');
            const cardIcon = document.getElementById('profileCardIcon');
            if(active.profile_pic_url && active.profile_pic_url.trim() !== "") {
                cardImg.src = active.profile_pic_url;
                cardImg.classList.remove('hidden');
                cardIcon.classList.add('hidden');
            } else {
                cardImg.classList.add('hidden');
                cardIcon.classList.remove('hidden');
            }

            const tagsBox = document.getElementById('profileCardTags');
            tagsBox.innerHTML = '';
            
            if(active.relationship_goal) {
                tagsBox.innerHTML += `<span class="badge goal">🎯 ${active.relationship_goal}</span>`;
            }
            if(active.interests) {
                active.interests.split(',').forEach(tag => {
                    if(tag.trim()) tagsBox.innerHTML += `<span class="badge">✨ ${tag.trim()}</span>`;
                });
            }
        }

        async function handleSwipe(isLike) {
            if (currentProfileIndex >= profilesQueue.length) return;
            const activeProfile = profilesQueue[currentProfileIndex];
            
            currentProfileIndex++;
            renderCurrentProfile();

            if (isLike) {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/like`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ likerId: currentUser.id, likedId: activeProfile.id })
                    });
                    const data = await res.json();
                    if (data.match) alert(`✨ Connection! You matched with ${activeProfile.name || 'this user'}!`);
                } catch (err) { console.error(err); }
            }
        }

        function openProfileModal() { document.getElementById('profileModal').classList.remove('hidden'); }
        
        function closeProfileModal() { 
            document.getElementById('profileModal').classList.add('hidden'); 
            document.getElementById('cropperStageBox').classList.add('hidden');
            if (cropperInstance) {
                cropperInstance.destroy();
                cropperInstance = null;
            }
        }

        function saveProfileChanges() {
            if (cropperInstance) {
                const canvas = cropperInstance.getCroppedCanvas({
                    width: 400,
                    height: 400
                });
                croppedImageBase64 = canvas.toDataURL('image/jpeg', 0.85);
            }

            currentUser.name = document.getElementById('myDetailsName').value;
            currentUser.location = document.getElementById('myDetailsLocation').value;
            currentUser.gender = document.getElementById('myDetailsGender').value;
            currentUser.relationship_goal = document.getElementById('myDetailsGoal').value;
            currentUser.profile_pic_url = croppedImageBase64; 
            currentUser.bio = document.getElementById('myDetailsBio').value;
            currentUser.interests = document.getElementById('myDetailsInterest').value;
            currentUser.looking_for = document.getElementById('myDetailsPreference').value;
            currentUser.is_visible = document.getElementById('myDetailsVisibility').checked;

            localStorage.setItem('user', JSON.stringify(currentUser));
            closeProfileModal();
            alert("Your profile modifications have been successfully saved!");
            fetchDiscoverFeed(); 
        }

        function handleLogout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
