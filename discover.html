<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDYLLE - Advanced Discover Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121212; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: #171717; border-bottom: 1px solid #222; }
        .logo { font-size: 1.8rem; color: #b51a3a; font-weight: 800; letter-spacing: 2px; text-decoration: none; }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .nav-btn { background: #222; border: 1px solid #333; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; text-decoration: none; font-size: 0.9rem; }
        .logout-btn { background: none; border: 1px solid #b51a3a; color: #b51a3a; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }

        .filter-drawer { background: #171717; padding: 15px 40px; border-bottom: 1px solid #222; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .filter-drawer input, .filter-drawer select { background: #222; border: 1px solid #333; color: white; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; outline: none; }
        .filter-drawer input:focus, .filter-drawer select:focus { border-color: #b51a3a; }

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .card-container { width: 100%; max-width: 420px; background-color: #171717; border-radius: 16px; border: 1px solid #2a2a2a; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .profile-img-container { flex: 1; min-height: 280px; background: #222; display: flex; justify-content: center; align-items: center; position: relative; }
        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .placeholder-icon { font-size: 5rem; opacity: 0.15; position: absolute; }
        
        .profile-details { padding: 24px; }
        .profile-name { font-size: 1.6rem; font-weight: 700; }
        .profile-meta { font-size: 0.9rem; color: #b51a3a; font-weight: 600; margin: 4px 0 10px; }
        .profile-bio { font-size: 0.95rem; color: #ccc; line-height: 1.5; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .badge { background: #262626; border: 1px solid #363636; color: #aaa; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        .badge.goal { border-color: #b51a3a; color: #ff6b8b; }

        .action-bar { display: flex; justify-content: space-around; padding: 0 24px 24px; }
        .swipe-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .swipe-btn:active { transform: scale(0.9); }
        .btn-dislike { background: #222; color: #ff4444; border: 1px solid #333; }
        .btn-like { background: #b51a3a; color: white; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-card { width: 90%; max-width: 500px; max-height: 85vh; background: #171717; border: 1px solid #2a2a2a; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #222; display: flex; justify-content: flex-end; gap: 10px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-group label { font-size: 0.8rem; color: #aaa; }
        .field-group input, .field-group select, .field-group textarea { background: #1f1f1f; border: 1px solid #2a2a2a; color: white; padding: 10px; border-radius: 6px; font-size: 0.9rem; }
        
        .upload-trigger-btn { background: #1f1f1f; border: 1px dashed #444; color: #aaa; padding: 12px; border-radius: 6px; cursor: pointer; text-align: center; font-weight: 600; }
        .cropper-stage-wrapper { margin-top: 10px; max-height: 200px; overflow: hidden; background: #000; border-radius: 6px; border: 1px solid #333; }
        .cropper-stage-wrapper img { max-width: 100%; display: block; }
        .hidden { display: none !important; }
        #emptyState { color: #666; font-size: 1.1rem; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="discover.html" class="logo">IDYLLE</a>
        <div class="nav-actions">
            <a href="inbox.html" class="nav-btn">💬 Chat Inbox</a>
            <button class="nav-btn" onclick="openProfileModal()">⚙️ Edit Profile</button>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </div>
    </header>

    <div class="filter-drawer">
        <input type="text" id="searchKeyword" placeholder="Search keywords..." oninput="applyAdvancedFilters()">
        
        <select id="filterGender" onchange="applyAdvancedFilters()">
            <option value="">All Genders</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Non-Binary">Non-Binary</option>
        </select>

        <select id="filterGoal" onchange="applyAdvancedFilters()">
            <option value="">All Goals</option>
            <option value="Long-term partnership">Long-term partnership</option>
            <option value="Short-term fun">Short-term fun</option>
        </select>

        <input type="text" id="filterInterest" placeholder="Filter by interest..." oninput="applyAdvancedFilters()">
        
        <button onclick="clearDiscoveryFilters()" style="background:none; border:1px solid #b51a3a; color:#b51a3a; padding:8px 12px; border-radius:6px; cursor:pointer; font-size:0.9rem;">Clear Filters</button>
    </div>

    <main>
        <div class="card-container" id="profileCard">
            <div class="profile-img-container">
                <img id="profileCardImg" src="" alt="" class="hidden">
                <div class="placeholder-icon" id="profileCardIcon">👤</div>
            </div>
            <div class="profile-details">
                <div class="profile-name" id="profileCardName">Loading Profiles...</div>
                <div class="profile-meta" id="profileCardMeta">Location</div>
                <p class="profile-bio" id="profileCardBio">Synchronizing discovery indices...</p>
                <div class="tag-container" id="profileCardTags"></div>
            </div>
            <div class="action-bar">
                <button class="swipe-btn btn-dislike" onclick="handleSwipe(false)">✖</button>
                <button class="swipe-btn btn-like" onclick="handleSwipe(true)">❤</button>
            </div>
        </div>
        <div id="emptyState" class="hidden">✨ No profiles match your filtering options. Try widening your criteria.</div>
    </main>

    <div class="modal-overlay hidden" id="profileModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>My Profile Customization</h3>
                <button class="nav-btn" style="padding: 4px 8px;" onclick="closeProfileModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="field-group">
                        <label>Display Name</label>
                        <input type="text" id="myDetailsName">
                    </div>
                    <div class="field-group">
                        <label>Location/Area</label>
                        <input type="text" id="myDetailsLocation">
                    </div>
                </div>
                <div class="form-row">
                    <div class="field-group">
                        <label>Gender</label>
                        <select id="myDetailsGender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Non-Binary">Non-Binary</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Relationship Goal</label>
                        <select id="myDetailsGoal">
                            <option value="Long-term partnership">Long-term partnership</option>
                            <option value="Short-term fun">Short-term fun</option>
                        </select>
                    </div>
                </div>
                <div class="field-group">
                    <label>Main Profile Image</label>
                    <input type="file" id="imageLoaderInput" class="hidden" accept="image/jpeg, image/png, image/webp" onchange="initializeImageCropper(this)">
                    <button type="button" class="upload-trigger-btn" onclick="document.getElementById('imageLoaderInput').click()">📸 Select Photo File</button>
                    <span id="fileUploadStatus" style="font-size:0.75rem; color:#888;">No file chosen</span>
                    <div class="cropper-stage-wrapper hidden" id="cropperStageBox">
                        <img id="imageContainerView" src="" alt="">
                    </div>
                </div>

                <div class="field-group" style="margin-top: 5px;">
                    <label>My Photo Gallery Slots (Max 5 items)</label>
                    <div id="galleryGridContainer" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 6px;"></div>
                    <input type="file" id="galleryFileLoader" class="hidden" accept="image/jpeg, image/png, image/webp" onchange="uploadGalleryPhoto(this)">
                    <button type="button" class="upload-trigger-btn" style="width: 100%;" onclick="document.getElementById('galleryFileLoader').click()">➕ Add Photo to Gallery Slot</button>
                </div>

                <div class="field-group">
                    <label>Short Bio</label>
                    <textarea id="myDetailsBio" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="field-group">
                        <label>Interests (comma separated)</label>
                        <input type="text" id="myDetailsInterest" placeholder="Gaming, Music, Art">
                    </div>
                    <div class="field-group">
                        <label>Looking For</label>
                        <select id="myDetailsPreference">
                            <option value="Everyone">Everyone</option>
                            <option value="Men">Men</option>
                            <option value="Women">Women</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="nav-btn" onclick="closeProfileModal()">Cancel</button>
                <button class="nav-btn" style="background:#b51a3a; border:none;" onclick="saveProfileChanges()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const BACKEND_URL = "https://idylle-backend.onrender.com";
        let currentUser = null;
        let profilesQueue = [];
        let currentProfileIndex = 0;
        let cropperInstance = null;
        let croppedImageBase64 = "";
        let debounceTimer;

        window.onload = function() {
            const session = localStorage.getItem('user');
            if (!session) { window.location.href = 'index.html'; return; }
            currentUser = JSON.parse(session);
            populateProfileFormValues();
            fetchDiscoverFeed();
        };

        function populateProfileFormValues() {
            document.getElementById('myDetailsName').value = currentUser.name || '';
            document.getElementById('myDetailsLocation').value = currentUser.location || '';
            document.getElementById('myDetailsGender').value = currentUser.gender || 'Male';
            document.getElementById('myDetailsGoal').value = currentUser.relationship_goal || 'Long-term partnership';
            document.getElementById('myDetailsBio').value = currentUser.bio || '';
            document.getElementById('myDetailsInterest').value = currentUser.interests || '';
            document.getElementById('myDetailsPreference').value = currentUser.looking_for || 'Everyone';
            if (currentUser.profile_pic_url) croppedImageBase64 = currentUser.profile_pic_url;
        }

        function applyAdvancedFilters() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => { currentProfileIndex = 0; fetchDiscoverFeed(); }, 400);
        }

        function clearDiscoveryFilters() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('filterGender').value = '';
            document.getElementById('filterGoal').value = '';
            document.getElementById('filterInterest').value = '';
            currentProfileIndex = 0;
            fetchDiscoverFeed();
        }

        function initializeImageCropper(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const targetImg = document.getElementById('imageContainerView');
                targetImg.src = e.target.result;
                document.getElementById('cropperStageBox').classList.remove('hidden');
                if (cropperInstance) cropperInstance.destroy();
                cropperInstance = new Cropper(targetImg, { aspectRatio: 1, viewMode: 1 });
            };
            reader.readAsDataURL(file);
        }

        async function fetchDiscoverFeed() {
            const search = document.getElementById('searchKeyword').value;
            const gender = document.getElementById('filterGender').value;
            const goal = document.getElementById('filterGoal').value;
            const interest = document.getElementById('filterInterest').value;
            try {
                const params = new URLSearchParams({ userId: currentUser.id, search, gender, goal, interest });
                const res = await fetch(`${BACKEND_URL}/api/users/discover?${params.toString()}`);
                profilesQueue = await res.json();
                renderCurrentProfile();
            } catch (err) { console.error(err); }
        }

        function renderCurrentProfile() {
            const card = document.getElementById('profileCard');
            const empty = document.getElementById('emptyState');
            if (currentProfileIndex >= profilesQueue.length) {
                card.classList.add('hidden'); empty.classList.remove('hidden'); return;
            }
            card.classList.remove('hidden'); empty.classList.add('hidden');
            const u = profilesQueue[currentProfileIndex];
            document.getElementById('profileCardName').innerText = u.name;
            document.getElementById('profileCardMeta').innerText = `${u.gender || 'User'} • ${u.location || 'Nearby'}`;
            document.getElementById('profileCardBio').innerText = u.bio || 'No bio provided.';
            const img = document.getElementById('profileCardImg');
            const icon = document.getElementById('profileCardIcon');
            if (u.profile_pic_url) {
                img.src = u.profile_pic_url; img.classList.remove('hidden'); icon.classList.add('hidden');
            } else {
                img.classList.add('hidden'); icon.classList.remove('hidden');
            }
            const tags = document.getElementById('profileCardTags');
            tags.innerHTML = u.relationship_goal ? `<span class="badge goal">🎯 ${u.relationship_goal}</span>` : '';
            if (u.interests) {
                u.interests.split(',').forEach(t => { if (t.trim()) tags.innerHTML += `<span class="badge">✨ ${t.trim()}</span>`; });
            }
        }

        async function handleSwipe(isLike) {
            if (currentProfileIndex >= profilesQueue.length) return;
            const target = profilesQueue[currentProfileIndex];
            currentProfileIndex++;
            renderCurrentProfile();
            if (isLike) {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/like`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ likerId: currentUser.id, likedId: target.id })
                    });
                    const data = await res.json();
                    if (data.match) alert(`🎉 Perfect match with ${target.name}!`);
                } catch(e) { console.error(e); }
            }
        }

        async function syncProfileGalleryUI() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/users/${currentUser.id}/photos`);
                const photos = await res.json();
                const container = document.getElementById('galleryGridContainer');
                container.innerHTML = '';
                for (let i = 0; i < 5; i++) {
                    const item = photos[i];
                    if (item) {
                        container.innerHTML += `
                            <div style="position: relative; background: #222; aspect-ratio:1; border-radius:6px; overflow:hidden; border:1px solid #333;">
                                <img src="${item.image_url}" style="width:100%; height:100%; object-fit:cover;">
                                <button type="button" onclick="removeGalleryAsset(${item.id})" style="position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.7); border:none; color:#ff4444; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:0.75rem;">✕</button>
                            </div>`;
                    } else {
                        container.innerHTML += `<div style="background:#1a1a1a; aspect-ratio:1; border-radius:6px; border:1px dashed #333; display:flex; align-items:center; justify-content:center; color:#444; font-size:1.2rem;">🖼️</div>`;
                    }
                }
            } catch (err) { console.error(err); }
        }

        async function uploadGalleryPhoto(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/users/${currentUser.id}/photos`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ imageUrl: e.target.result })
                    });
                    if (response.ok) syncProfileGalleryUI();
                } catch (err) { console.error(err); }
            };
            reader.readAsDataURL(file);
        }

        async function removeGalleryAsset(photoId) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/photos/${photoId}`, { method: 'DELETE' });
                if (res.ok) syncProfileGalleryUI();
            } catch (err) { console.error(err); }
        }

        function openProfileModal() { document.getElementById('profileModal').classList.remove('hidden'); syncProfileGalleryUI(); }
        function closeProfileModal() { 
            document.getElementById('profileModal').classList.add('hidden'); 
            if(cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
            document.getElementById('cropperStageBox').classList.add('hidden');
        }

        function saveProfileChanges() {
            if (cropperInstance) {
                const canvas = cropperInstance.getCroppedCanvas({ width: 300, height: 300 });
                croppedImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
            }
            currentUser.name = document.getElementById('myDetailsName').value;
            currentUser.location = document.getElementById('myDetailsLocation').value;
            currentUser.gender = document.getElementById('myDetailsGender').value;
            currentUser.relationship_goal = document.getElementById('myDetailsGoal').value;
            currentUser.bio = document.getElementById('myDetailsBio').value;
            currentUser.interests = document.getElementById('myDetailsInterest').value;
            currentUser.looking_for = document.getElementById('myDetailsPreference').value;
            currentUser.profile_pic_url = croppedImageBase64;

            localStorage.setItem('user', JSON.stringify(currentUser));
            closeProfileModal(); fetchDiscoverFeed(); alert("Profile settings synchronized!");
        }

        function handleLogout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
